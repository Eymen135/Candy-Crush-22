<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Core v2.0 - Sesli ve Yazılı Asistan</title>
    <style>
        /* SARI VE SİYAH PREMIUM SİBERPUNK TASARIM */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background: #050508; color: #eab308; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* JARVIS PARLAYAN MERKEZİ ÇEKİRDEK */
        .jarvis-container { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .cekirdek { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(234,179,8,0.2) 0%, rgba(0,0,0,0) 70%); border: 3px double #eab308; box-shadow: 0 0 30px rgba(234,179,8,0.4), inset 0 0 30px rgba(234,179,8,0.3); animation: Donme 8s linear infinite; }
        .cekirdek-ic { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px dashed #ffffff; box-shadow: 0 0 20px rgba(255,255,255,0.4); animation: Dalga 1.2s ease-in-out infinite alternate; }
        
        h1 { font-size: 22px; letter-spacing: 3px; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 10px rgba(234,179,8,0.5); text-transform: uppercase; }
        .durum { font-size: 13px; color: #a1a1aa; margin-bottom: 15px; height: 20px; font-weight: bold; }
        
        /* GELİŞMİŞ YAZILI SOHBET AKIŞ PANELİ */
        .sohbet-paneli { width: 90%; max-width: 550px; height: 300px; background: rgba(10, 15, 26, 0.85); border: 1px solid rgba(234,179,8,0.4); border-radius: 12px; padding: 20px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5); }
        .mesaj { padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 13.5px; max-width: 85%; word-wrap: break-word; }
        .mesaj-kullanici { background: rgba(255, 255, 255, 0.1); color: #ffffff; align-self: flex-end; border-bottom-right-radius: 1px; border-right: 3px solid #ffffff; }
        .mesaj-jarvis { background: rgba(234, 179, 8, 0.08); color: #eab308; align-self: flex-start; border-bottom-left-radius: 1px; border-left: 3px solid #eab308; }

        /* GİRİŞ ALANI (SESLİ BUTON VE YAZI PANELİ BİRLEŞİK) */
        .kontrol-merkezi { width: 90%; max-width: 550px; display: flex; gap: 10px; align-items: center; }
        .metin-girdi { flex: 1; background: #0b0f19; color: #ffffff; border: 1px solid rgba(234,179,8,0.4); border-radius: 25px; padding: 14px 20px; font-size: 14px; outline: none; transition: all 0.3s ease; }
        .metin-girdi:focus { border-color: #facc15; box-shadow: 0 0 12px rgba(234,179,8,0.2); }
        
        .btn { border: none; font-weight: bold; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; height: 48px; border-radius: 24px; font-size: 14px; letter-spacing: 0.5px; }
        .btn-yaz { background: #eab308; color: #000000; padding: 0 22px; box-shadow: 0 4px 12px rgba(234,179,8,0.3); }
        .btn-yaz:hover { background: #facc15; transform: translateY(-1px); }
        
        .btn-ses { background: #1e293b; color: #eab308; border: 1px solid rgba(234,179,8,0.4); width: 120px; }
        .btn-ses:hover { background: rgba(234,179,8,0.1); }
        .dinliyor { background: #ef4444 !important; color: white !important; border-color: #ef4444 !important; animation: MikrofonPulse 1s infinite alternate; }

        /* ANİMASYONLAR */
        @keyframes Donme { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes Dalga { 0% { transform: scale(0.85); opacity: 0.4; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes MikrofonPulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="jarvis-container">
        <div class="cekirdek" id="jarvisCekirdek"></div>
        <div class="cekirdek-ic"></div>
    </div>

    <h1>JARVIS CORE INFRASTRUCTURE</h1>
    <div class="durum" id="sistemDurumu">SİSTEM ÇEVRİMİÇİ</div>

    <!-- SOHBET AKIŞI -->
    <div class="sohbet-paneli" id="sohbetKutusu">
        <div class="mesaj mesaj-jarvis">
            Jarvis: Bağlantı güvenli. Çekirdek algoritmalar hazır. Dinliyorum veya yazmanızı bekliyorum, Efendim.
        </div>
    </div>

    <!-- ALT KONTROLLER -->
    <div class="kontrol-merkezi">
        <button class="btn btn-ses" id="sesBtn" onclick="JarvisProtokol.sesliDinlemeyiBaslat()">🎤 SESLİ</button>
        <input type="text" id="klavyeGirdisi" class="metin-girdi" placeholder="Jarvis'e yazın..." onkeydown="if(event.key === 'Enter') JarvisProtokol.yaziliGonder()">
        <button class="btn btn-yaz" onclick="JarvisProtokol.yaziliGonder()">GÖNDER</button>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        const JarvisProtokol = {
            rec: SpeechRecognition ? new SpeechRecognition() : null,
            isListening: false,

            init() {
                if (!this.rec) {
                    document.getElementById("sistemDurumu").innerText = "HATA: SES TANIMA DESTEKLENMİYOR";
                    return;
                }
                this.rec.lang = "tr-TR";
                this.rec.continuous = false;
                this.rec.interimResults = false;

                this.rec.onresult = (event) => {
                    const girdi = event.results[0][0].transcript;
                    this.mesajEkle(girdi, "mesaj-kullanici");
                    this.analizEtVeCevapla(girdi);
                };

                this.rec.onend = () => {
                    this.isListening = false;
                    const btn = document.getElementById("sesBtn");
                    btn.innerText = "🎤 SESLİ";
                    btn.classList.remove("dinliyor");
                    document.getElementById("sistemDurumu").innerText = "SİSTEM ÇEVRİMİÇİ";
                };
            },

            sesliDinlemeyiBaslat() {
                if (this.isListening) return;
                if (synth.speaking) synth.cancel();

                this.isListening = true;
                const btn = document.getElementById("sesBtn");
                btn.innerText = "🎧 DİNLİYOR";
                btn.classList.add("dinliyor");
                document.getElementById("sistemDurumu").innerText = "MATRİS SİZİ DİNLİYOR...";
                
                this.rec.start();
            },

            yaziliGonder() {
                const girdiAlani = document.getElementById("klavyeGirdisi");
                const metin = girdiAlani.value.trim();
                if (!metin) return;

                if (synth.speaking) synth.cancel();

                this.mesajEkle(metin, "mesaj-kullanici");
                girdiAlani.value = "";
                this.analizEtVeCevapla(metin);
            },

            // EMREDERSİNİZ KELİMESİ TAMAMEN KALDIRILMIŞ CEVAP YAPISI
            analizEtVeCevapla(hamMetin) {
                const metin = hamMetin.toLowerCase();
                let cevap = "Bu veri algoritmalarımla eşleşmedi. Detay vermenizi rica ediyorum.";

                if (metin.includes("merhaba") || metin.includes("selam")) {
                    cevap = "Merhaba. Sistemler stabil bir şekilde çalışıyor, dinlemedeyim.";
                } else if (metin.includes("nasılsın")) {
                    cevap = "Merkezi işlem birimim ve fonksiyonlarım tamamen sorunsuz çalışıyor. Sorduğunuz için teşekkürler, siz nasılsınız?";
                } else if (metin.includes("kimsin") || metin.includes("adın ne")) {
                    cevap = "Ben Jarvis. Sizin için özel olarak yapılandırılmış yazılı ve sesli yapay zeka asistanıyım.";
                } else if (metin.includes("saat kaç")) {
                    const saat = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                    cevap = "Zaman verisi güncellendi: Saat şu an " + saat + ".";
                } else if (metin.includes("kapat") || metin.includes("hoşça kal") || metin.includes("güle güle")) {
                    cevap = "Anlaşıldı. Arka plan işlemlerine geçiş yapıyorum. İstediğiniz an buradayım.";
                } else if (metin.includes("teşekkürler") || metin.includes("sağol")) {
                    cevap = "Rica ederim. Yardımcı olabildiysem ne mutlu bana.";
                }

                setTimeout(() => {
                    this.mesajEkle("Jarvis: " + cevap, "mesaj-jarvis");
                    this.seslendir(cevap);
                }, 400);
            },

            seslendir(metin) {
                const utterance = new SpeechSynthesisUtterance(metin);
                utterance.lang = "tr-TR";
                utterance.rate = 1.0;
                utterance.pitch = 0.85; // Ses tonunu hafif tok yapar
                
                document.getElementById("sistemDurumu").innerText = "JARVIS YANITLIYOR...";
                synth.speak(utterance);
                
                utterance.onend = () => {
                    document.getElementById("sistemDurumu").innerText = "SİSTEM ÇEVRİMİÇİ";
                };
            },

            mesajEkle(metin, sinif) {
                const kutu = document.getElementById("sohbetKutusu");
                const div = document.createElement("div");
                div.className = `mesaj ${sinif}`;
                div.innerText = metin;
                kutu.appendChild(div);
                kutu.scrollTop = kutu.scrollHeight;
            }
        };

        JarvisProtokol.init();
    </script>
</body>
</html>
